  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  /* ---------- Success / secondary (green) ---------- */\n  --green-50:  #F0FDF4;\n  --green-200: #BBF7D0;\n  --green-300: #86EFAC;\n  --green-500: #22C55E;   /* toggle \"on\", status dot */\n  --green-600: #16A34A;\n  --green-700: #15803D;   /* Excel export, enabled family accent */\n  --green-900: #14532D;\n\n  /* ---------- Warning (amber) ---------- */\n  --amber-50:  #FFFBEB;\n  --amber-100: #FEF3C7;\n  --amber-200: #FDE68A;\n  --amber-300: #FCD34D;\n  --amber-400: #FBBF24;\n  --amber-500: #F59E0B;\n  --amber-600: #D97706;\n  --amber-700: #B45309;\n  --amber-900: #78350F;\n\n  /* ---------- Info (blue) — used on Industrial badges ---------- */\n  --blue-100: #DBEAFE;\n  --blue-300: #93C5FD;\n  --blue-700: #1D4ED8;\n  --blue-900: #1E3A8A;\n\n  /* ---------- Neutrals ---------- */\n  --gray-50:  #F9FAFB;\n  --gray-100: #F3F4F6;\n  --gray-200: #E5E7EB;\n  --gray-300: #D1D5DB;\n  --gray-400: #9CA3AF;\n  --gray-500: #6B7280;\n  --gray-600: #4B5563;\n  --gray-700: #374151;\n  --gray-800: #1F2937;\n  --gray-900: #111827;\n\n  /* ---------- Semantic surfaces (light) ---------- */\n  --bg-page:      #FFFFFF;\n  --bg-subtle:    var(--gray-50);\n  --bg-muted:     var(--gray-100);\n  --bg-card:      #FFFFFF;\n  --bg-inset:     var(--gray-50);\n  --bg-overlay:   rgba(0, 0, 0, 0.50);\n\n  /* ---------- Semantic foreground (light) ---------- */\n  --fg-1:         var(--gray-800);    /* primary text */\n  --fg-2:         var(--gray-600);    /* body text */\n  --fg-3:         var(--gray-500);    /* secondary text */\n  --fg-4:         var(--gray-400);    /* tertiary / placeholder */\n  --fg-inverse:   #FFFFFF;\n\n  /* ---------- Borders (light) ---------- */\n  --border-subtle:  var(--gray-100);\n  --border-default: var(--gray-200);\n  --border-strong:  var(--gray-300);\n  --border-focus:   var(--red-400);\n\n  /* ---------- Semantic intents ---------- */\n  --intent-primary:        var(--red-600);\n  --intent-primary-hover:  var(--red-700);\n  --intent-primary-active: var(--red-800);\n  --intent-primary-soft:   var(--red-50);\n\n  --intent-success:        var(--green-700);\n  --intent-success-soft:   var(--green-50);\n  --intent-success-border: var(--green-200);\n\n  --intent-warning:        var(--amber-500);\n  --intent-warning-soft:   var(--amber-50);\n  --intent-warning-border: var(--amber-200);\n  --intent-warning-fg:     var(--amber-700);\n\n  --intent-danger:         var(--red-600);\n  --intent-danger-soft:    var(--red-50);\n  --intent-danger-border:  var(--red-200);\n  --intent-danger-fg:      var(--red-700);\n\n  --intent-info:           var(--blue-700);\n  --intent-info-soft:      var(--blue-100);\n\n  /* ---------- Typography ---------- */\n  --font-sans:   'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI',\n                 Roboto, 'Helvetica Neue', Arial, sans-serif;\n  --font-mono:   ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,\n                 'Liberation Mono', monospace;\n\n  /* Sizes (Tailwind scale) */\n  --text-10: 10px;   /* micro-hint */\n  --text-11: 11px;   /* micro-badge */\n  --text-xs: 12px;\n  --text-sm: 14px;\n  --text-base: 16px;\n  --text-lg: 18px;\n  --text-xl: 20px;\n  --text-2xl: 24px;\n  --text-3xl: 30px;\n\n  /* Weights */\n  --weight-regular:  400;\n  --weight-medium:   500;\n  --weight-semibold: 600;\n  --weight-bold:     700;\n\n  /* Line heights */\n  --leading-tight:  1.25;\n  --leading-snug:   1.35;\n  --leading-normal: 1.5;\n\n  /* ---------- Spacing (Tailwind 4px base) ---------- */\n  --space-0-5: 2px;\n  --space-1:   4px;\n  --space-1-5: 6px;\n  --space-2:   8px;\n  --space-3:   12px;\n  --space-4:   16px;\n  --space-5:   20px;\n  --space-6:   24px;\n  --space-8:   32px;\n  --space-10:  40px;\n  --space-12:  48px;\n\n  /* ---------- Radii ---------- */\n  --radius-sm:   4px;\n  --radius-md:   6px;\n  --radius-lg:   8px;    /* inputs, selects, inline buttons */\n  --radius-xl:   12px;   /* cards, modals, primary CTAs */\n  --radius-2xl:  16px;\n  --radius-full: 9999px; /* pills, dots, toggle */\n\n  /* ---------- Shadows ---------- */\n  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);\n  --shadow:    0 1px 3px 0 rgb(0 0 0 / 0.10), 0 1px 2px -1px rgb(0 0 0 / 0.10);\n  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.10), 0 2px 4px -2px rgb(0 0 0 / 0.10);\n  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.10), 0 4px 6px -4px rgb(0 0 0 / 0.10);\n  --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.10), 0 8px 10px -6px rgb(0 0 0 / 0.10);\n\n  /* ---------- Focus ring (replicates `ring-2 ring-red-400`) ---------- */\n  --ring-width: 2px;\n  --ring-color: var(--red-400);\n  --ring-color-warning: var(--amber-400);\n  --ring-color-danger:  var(--red-400);\n\n  /* ---------- Motion ---------- */\n  --dur-fast:  120ms;\n  --dur-med:   180ms;\n  --ease-out:  cubic-bezier(0.16, 1, 0.3, 1);\n}\n\n[data-theme=\"dark\"] {\n  --bg-page:      var(--gray-900);\n  --bg-subtle:    #0B1220;\n  --bg-muted:     var(--gray-800);\n  --bg-card:      var(--gray-800);\n  --bg-inset:     rgba(255,255,255,0.02);\n\n  --fg-1:         #FFFFFF;\n  --fg-2:         var(--gray-300);\n  --fg-3:         var(--gray-400);\n  --fg-4:         var(--gray-500);\n\n  --border-subtle:  var(--gray-800);\n  --border-default: var(--gray-700);\n  --border-strong:  var(--gray-600);\n\n  --intent-primary-soft:   rgba(220, 38, 38, 0.15);\n  --intent-success-soft:   rgba(34, 197, 94, 0.10);\n  --intent-warning-soft:   rgba(245, 158, 11, 0.15);\n  --intent-danger-soft:    rgba(220, 38, 38, 0.20);\n}\n\n/* =========================================================================\n   Semantic element styles — apply to a bare HTML doc to get the brand look.\n   ========================================================================= */\n\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--fg-1);\n  background: var(--bg-page);\n  font-size: var(--text-sm);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1 { font-size: va --text2:rgba(234,240,250,.66);--text3:rgba(234,240,250,.40);--accent:#4E86C7;--accent2:#9BC1E6;--onaccent:#04101E;--glow:rgba(78,134,199,.45);--glow2:rgba(155,193,230,.26);--barlow:rgba(255,255,255,.09);--ctabg:#0B1424}\n  .v{display:none}\n  .show-home .v-home,.show-quienes .v-quienes,.show-caracteristicas .v-caracteristicas,.show-planes .v-planes,.show-blog .v-blog,.show-bolsa .v-bolsa,.show-contacto .v-contacto{display:block}\n  .exportall .v{display:block!important}\n  .tlight{--bg:#F5F8FC;--bg2:#ECF1F8;--navbg:rgba(245,248,252,.82);--surface:#FFFFFF;--surface2:#FFFFFF;--panel:#FFFFFF;--panel2:#F3F7FC;--panel3:#F7FAFD;--border:#E1E8F2;--text:#0C2340;--text2:#47576A;--text3:#8A97A8;--accent:#2F66B5;--accent2:#4E82AB;--onaccent:#FFFFFF;--glow:rgba(47,102,181,.22);--glow2:rgba(78,130,171,.16);--barlow:#E6EDF6;--ctabg:#FFFFFF}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div class=\"app {{ themeClass }}\" style=\"width:1280px;margin:0 auto;background:var(--bg);color:var(--text);position:relative;overflow:hidden;transition:background-color .3s\">\n\n  <!-- ambient background -->\n  <div style=\"position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:0\">\n    <div style=\"position:absolute;top:-160px;right:-120px;width:620px;height:620px;border-radius:50%;background:radial-gradient(circle,var(--glow),transparent 66%);animation:glow 9s ease-in-out infinite\"><\u002Fdiv>\n    <div style=\"position:absolute;top:520px;left:-180px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,var(--glow2),transparent 66%);animation:glow 11s ease-in-out infinite 2s\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ===== NAV ===== -->\n  <header style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 40px;background:var(--navbg);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)\">\n    <span class=\"lnk\" sc-camel-on-click=\"{{ go.home }}\" style=\"display:inline-flex;align-items:center;gap:11px\">\n      <span style=\"display:flex;flex-direction:column;gap:3px;width:42px\">\n        <span style=\"display:flex;gap:4px;height:12px\"><span style=\"flex:1;border-radius:99px;background:var(--accent)\"><\u002Fspan><span style=\"width:12px;border-radius:99px;background:var(--accent2)\"><\u002Fspan><\u002Fspan>\n        <span style=\"display:flex;gap:4px;height:12px\"><span style=\"width:12px;border-radius:99px;background:var(--accent2)\"><\u002Fspan><span style=\"flex:1;border-radius:99px;background:var(--accent)\"><\u002Fspan><\u002Fspan>\n      <\u002Fspan>\n      <span class=\"wm\" style=\"font-size:24px;color:var(--text)\">saaf<\u002Fspan>\n    <\u002Fspan>\n    <nav style=\"display:flex;gap:6px;align-items:center\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n        <span class=\"lnk navlink\" sc-camel-on-click=\"{{ item.onClick }}\" style=\"{{ item.style }}\">{{ item.label }}<span class=\"nudot\" style=\"{{ item.dotStyle }}\"><\u002Fspan><\u002Fspan>\n      <\u002Fsc-for>\n    <\u002Fnav>\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <span class=\"lnk btn\" sc-camel-on-click=\"{{ toggleTheme }}\" title=\"Cambiar tema\" style=\"width:38px;height:38px;justify-content:center;border-radius:11px;border:1px solid var(--border);color:var(--text2);background:var(--surface)\"><i data-lucide=\"{{ themeIcon }}\" style=\"width:18px;height:18px\"><\u002Fi><\u002Fspan>\n      <span class=\"btn\" sc-camel-on-click=\"{{ go.contacto }}\" style=\"font-size:14px;font-weight:600;color:var(--onaccent);padding:11px 20px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 8px 22px -10px var(--glow)\">Solicitar demo<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <main class=\"{{ viewClass }}\" style=\"position:relative;z-index:1\">\n  <div class=\"views\">\n\n    <!-- ================= HOME ================= -->\n    <div class=\"v v-home\">\n      <!-- hero -->\n      <section style=\"padding:84px 40px 72px;position:relative\">\n        <div style=\"max-width:1120px;margin:0 auto;text-align:center\">\n          <div class=\"rvl in\" style=\"display:inline-flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);color:var(--text2);font-size:12.5px;font-weight:500;padding:8px 15px;border-radius:999px;margin-bottom:28px\"><span class=\"mono\" style=\"color:var(--accent2);font-weight:600\">SAAF<\u002Fspan><span style=\"width:4px;height:4px;border-radius:99px;background:var(--text3)\"><\u002Fspan>Control inteligente de activo fijo · LATAM<\u002Fdiv>\n          <h1 class=\"rvl in disp\" style=\"font-size:64px;line-height:1.02;font-weight:700;margin:0 auto 22px;max-width:900px;color:var(--text)\">La administración de activos fijos<br>más <span style=\"background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">fácil y rápida<\u002Fspan><\u002Fh1>\n          <p class=\"rvl in\" style=\"font-size:19px;line-height:1.55;color:var(--text2);margin:0 auto 34px;max-width:600px\">SAAF lleva al corriente el estado y la ubicación de cada activo de tu empresa. Regístralos, etiquétalos con QR, calcula su depreciación y contrólalos — todo en una interfaz amigable.<\u002Fp>\n          <div class=\"rvl in\" style=\"display:flex;gap:13px;justify-content:center;margin-bottom:20px\">\n            <span class=\"btn\" sc-camel-on-click=\"{{ go.contacto }}\" style=\"font-size:16px;font-weight:700;color:var(--onaccent);padding:16px 30px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 16px 34px -12px var(--glow)\">Solicitar demo<i data-lucide=\"arrow-right\" style=\"width:18px;height:18px\"><\u002Fi><\u002Fspan>\n            <span class=\"btn\" sc-camel-on-click=\"{{ go.caracteristicas }}\" style=\"font-size:16px;font-weight:600;color:var(--text);padding:16px 28px;border-radius:14px;backgro =\"font-size:22px;color:var(--text)\">saaf<\u002Fspan><\u002Fspan>\n          <p style=\"font-size:14.5px;line-height:1.6;color:var(--text2);margin:0 0 16px;max-width:280px\">La administración de activos fijos más fácil y rápida de Latinoamérica.<\u002Fp>\n          <div style=\"font-size:13.5px;line-height:1.9;color:var(--text2)\"><div>Enrique Rébsamen 512, CDMX<\u002Fdiv><span style=\"color:var(--accent2);font-weight:600\">(+52) 55-7047-1421<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div><div style=\"font-size:13px;font-weight:700;color:var(--text);margin-bottom:15px\">Producto<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><span class=\"lnk\" sc-camel-on-click=\"{{ go.caracteristicas }}\" style=\"color:var(--text2)\">Características<\u002Fspan><span class=\"lnk\" sc-camel-on-click=\"{{ go.planes }}\" style=\"color:var(--text2)\">Planes<\u002Fspan><span class=\"lnk\" sc-camel-on-click=\"{{ go.blog }}\" style=\"color:var(--text2)\">Blog<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:13px;font-weight:700;color:var(--text);margin-bottom:15px\">Empresa<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><span class=\"lnk\" sc-camel-on-click=\"{{ go.quienes }}\" style=\"color:var(--text2)\">¿Quiénes somos?<\u002Fspan><span class=\"lnk\" sc-camel-on-click=\"{{ go.bolsa }}\" style=\"color:var(--text2)\">Bolsa de Trabajo<\u002Fspan><span class=\"lnk\" sc-camel-on-click=\"{{ go.contacto }}\" style=\"color:var(--text2)\">Contacto<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div><div style=\"font-size:13px;font-weight:700;color:var(--text);margin-bottom:15px\">Contacto<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:10px;font-size:14px\"><span class=\"lnk\" sc-camel-on-click=\"{{ go.contacto }}\" style=\"color:var(--text2)\">Solicitar demo<\u002Fspan><span class=\"lnk\" sc-camel-on-click=\"{{ go.contacto }}\" style=\"color:var(--text2)\">Hablar con un asesor<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-top:1px solid var(--border);padding-top:24px;font-size:13px;color:var(--text3)\">© 2026 SAAF · Software Activo Fijo. Todos los derechos reservados.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:880},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Tema&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'home', theme: 'dark' };\n\n  componentDidMount() { this._icons(); this._reveal(); this._scrollTop(); }\n  componentDidUpdate(prevP, prevS) {\n    this._icons();\n    if (prevS && prevS.view !== this.state.view) { this._reveal(); this._scrollTop(); }\n  }\n  _icons() { const go = () => { if (window.lucide) window.lucide.createIcons(); }; go(); setTimeout(go,120); setTimeout(go,400); setTimeout(go,1000); }\n  _scrollTop() { try { const el = this.rootEl || document.scrollingElement; window.scrollTo(0,0); if (this.rootEl && this.rootEl.scrollIntoView) {} } catch(e){} }\n  _countUp(el){\n    const t = parseFloat(el.getAttribute('data-count')); if (isNaN(t)) return;\n    const suf = el.getAttribute('data-suffix')||''; const dur=1200, s=performance.now();\n    const fmt=n=>Math.round(n).toLocaleString('en-US');\n    const tick=now=>{ const p=Math.min((now-s)/dur,1); const e=1-Math.pow(1-p,3); el.textContent=fmt(t*e)+suf; if(p<1)requestAnimationFrame(tick); };\n    requestAnimationFrame(tick);\n  }\n  _reveal(){\n    const root = this.rootEl || document;\n    setTimeout(()=>{\n      const els = Array.from(root.querySelectorAll('.rvl:not(.in)'));\n      const counters = Array.from(root.querySelectorAll('[data-count]'));\n      const seen = new WeakSet();\n      const revealAll=()=>{ els.forEach(e=>e.classList.add('in')); counters.forEach(e=>{ if(!seen.has(e)){seen.add(e); this._countUp(e);} }); };\n      if(!('IntersectionObserver' in window)){ revealAll(); return; }\n      const io=new IntersectionObserver(en=>{ en.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} }); },{rootMargin:'0px 0px -6% 0px',threshold:.06});\n      els.forEach(e=>io.observe(e));\n      const cio=new IntersectionObserver(en=>{ en.forEach(e=>{ if(e.isIntersecting&&!seen.has(e.target)){ seen.add(e.target); this._countUp(e.target); cio.unobserve(e.target);} }); },{threshold:.5});\n      counters.forEach(e=>cio.observe(e));\n      setTimeout(revealAll, 2600);\n    }, 40);\n  }\n\n  _mk(v){ return () => this.setState({ view: v }); }\n\n  renderVals(){\n    const dark = this.state.theme === 'dark';\n    const pal = dark ? {\n      bg:'#070C16', bg2:'#0B1424', navbg:'rgba(9,14,24,.72)',\n      surface:'rgba(255,255,255,.045)', surface2:'rgba(255,255,255,.07)',\n      panel:'rgba(255,255,255,.035)', panel2:'rgba(255,255,255,.05)', panel3:'rgba(255,255,255,.03)',\n      border:'rgba(255,255,255,.10)', text:'#EAF0FA', text2:'rgba(234,240,250,.66)', text3:'rgba(234,240,250,.40)',\n      accent:'#4E9BF5', accent2:'#38E0C8', onaccent:'#04101E',\n      glow:'rgba(78,155,245,.45)', glow2:'rgba(56,224,200,.28)', barlow:'rgba(255,255,255,.09)',\n      ctabg:'#0B1424'\n    } : {\n      bg:'#F5F8FC', bg2:'#ECF1F8', navbg:'rgba(245,248,252,.8)',\n      surface:'#FFFFFF', surface2:'#FFFFFF',\n      panel:'#FFFFFF', panel2:'#F3F7FC', panel3:'#F7FAFD',\n      border:'#E1E8F2', text:'#0C2340', text2:'#47576A', text3:'#8A97A8',\n      accent:'#2F6FD6', accent2:'#0FA894', onaccent:'#FFFFFF',\n      glow:'rgba(47,111,214,.22)', glow2:'rgba(15,168,148,.16)', barlow:'#E6EDF6',\n      ctabg:'#FFFFFF'\n    };\n    const view = this.state.view;\n    const navDef = [\n      ['¿Quiénes somos?','quienes'], ['Características','caracteristicas'], ['Planes é etiquetar tus activos con QR', desc:'Trazabilidad y auditorías más rápidas en campo.' }\n      ],\n      blogGrid: [\n        { tag:'MULTIEMPRESA', title:'Consolidar activos de varias empresas', desc:'Buenas prácticas para grupos empresariales.', slot:'blog-1' },\n        { tag:'SEGURIDAD', title:'OAuth2 y tus datos de activo fijo', desc:'Qué es y por qué importa para tu operación.', slot:'blog-2' },\n        { tag:'FISCAL', title:'Prepara tu cierre de activo fijo', desc:'Checklist para un cierre contable sin sustos.', slot:'blog-3' }\n      ],\n      valores: [\n        { icon:'history', title:'Experiencia', desc:'Más de 30 años en levantamiento y control de activo fijo, respaldados por Grupo ANEPSA.' },\n        { icon:'sliders-horizontal', title:'A la medida', desc:'Una solución que se ajusta a las necesidades de gestión, mantenimiento y fiscales de cada cliente.' },\n        { icon:'shield-check', title:'Confianza', desc:'Metodologías y herramientas tecnológicas que dan certeza a nuestros clientes.' }\n      ],\n      caractFunciones: [\n        'Acceso a la ficha del activo mediante lectura de QR desde cualquier dispositivo con internet',\n        'Control de cambios con autorizaciones y permisos según el perfil de usuario',\n        'Dashboard editable',\n        'Generación de códigos de barras y QR',\n        'Personalización de formatos de módulos a la medida de la empresa',\n        'App en Clouding o Web Service',\n        'Alta de fotografías, facturas y documentos',\n        'Creación y administración de multiempresas',\n        'Creación y administración de usuarios y perfiles',\n        'Historial de cambios por activo',\n        'Importación y exportación de bases de activo fijo',\n        'Vales de resguardo por usuario'\n      ],\n      ventajas: [\n        { icon:'map-pin', title:'Activo', items:['Ubicación ágil de los activos','Historial y control de activos','Placas con código de barras y QR'] },\n        { icon:'file-bar-chart', title:'Report
